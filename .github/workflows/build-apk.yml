<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Patalix Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #000000;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Premium Header */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #000000;
        }

        .brand-name {
            font-size: 14px;
            letter-spacing: 1px;
            color: #888888;
            font-weight: 600;
        }

        .history-btn {
            font-size: 15px;
            color: #4285f4;
            cursor: pointer;
            font-weight: bold;
            padding: 5px 10px;
        }

        /* Display Panel Fixed Fullscreen */
        .display-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 25px 20px;
            background-color: #000000;
            min-height: 160px;
        }

        .query-line {
            font-size: 18px;
            color: #888888;
            margin-bottom: 8px;
            min-height: 24px;
            text-align: right;
            width: 100%;
        }

        .main-display {
            font-size: 44px;
            font-weight: 400;
            color: #ffffff;
            text-align: right;
            width: 100%;
            word-wrap: break-word;
            overflow-y: auto;
            max-height: 120px;
        }

        /* Pad / Tactile Buttons Grid */
        .pad-container {
            background-color: #000000;
            padding: 12px;
            border-top: 1px solid #111111;
        }

        .grid-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }

        .btn {
            flex: 1;
            margin: 6px;
            height: 72px;
            border-radius: 50px;
            border: none;
            outline: none;
            font-size: 24px;
            font-weight: 500;
            background-color: #1c1c1e;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.05s ease, background-color 0.1s ease;
        }

        /* True Tactile Mechanical Button Press Effect */
        .btn:active {
            transform: scale(0.88); /* Physically depresses inward */
            background-color: #2c2c2e; /* Instant shade shift mimicking a shadow */
        }

        .btn-action {
            background-color: #3a3a3c;
            color: #d1d1d6;
        }
        .btn-action:active {
            background-color: #4a4a4c;
        }

        .btn-operator {
            background-color: #2f3b52;
            color: #8ab4f8;
        }
        .btn-operator:active {
            background-color: #3f4b62;
        }

        .btn-ai {
            background-color: #3b2323;
            color: #ff6b6b;
            font-weight: bold;
        }
        .btn-ai.active {
            background-color: #ff6b6b;
            color: #000000;
            box-shadow: 0 0 15px #ff6b6b;
        }

        .btn-equal {
            background-color: #8ab4f8;
            color: #000000;
        }
        .btn-equal:active {
            background-color: #aecbfa;
        }

        /* Premium Bottom History Drawer Sheet */
        .history-drawer {
            position: fixed;
            top: -100%;
            left: 0;
            width: 100%;
            height: 85%;
            background-color: #121212;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
            transition: top 0.35s cubic-bezier(0.15, 0.85, 0.35, 1);
            z-index: 999;
            display: flex;
            flex-direction: column;
            padding: 22px;
        }

        .history-drawer.open {
            top: 0;
        }

        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid #222222;
            margin-bottom: 15px;
        }

        .drawer-content {
            flex: 1;
            overflow-y: auto;
        }

        .history-item {
            padding: 12px 0;
            border-bottom: 1px solid #1c1c1e;
            text-align: right;
        }

        .history-q { color: #8a8a8f; font-size: 16px; }
        .history-a { color: #ffffff; font-size: 22px; margin-top: 5px; }

        .close-drawer {
            font-size: 26px;
            color: #ff6b6b;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="historyDrawer" class="history-drawer">
        <div class="drawer-header">
            <span style="font-weight: bold; color: #8e8e93; font-size: 16px;">History</span>
            <span id="clearHistory" style="color: #4285f4; font-size: 15px; font-weight: bold; cursor: pointer;">Clear all</span>
            <span class="close-drawer" id="closeDrawer">✕</span>
        </div>
        <div class="drawer-content" id="historyItems"></div>
    </div>

    <div class="header-bar">
        <div class="brand-name">PATALIX CALCULATOR</div>
        <div class="history-btn" id="viewHistoryBtn">History</div>
    </div>

    <div class="display-container" id="swipeZone">
        <div class="query-line" id="queryDisplay"></div>
        <div class="main-display" id="calcDisplay">0</div>
    </div>

    <div class="pad-container">
        <div class="grid-row">
            <button class="btn btn-action" onclick="clearAll()">AC</button>
            <button class="btn btn-action" onclick="backspace()">CE</button>
            <button class="btn btn-action" onclick="inputOp('%')">%</button>
            <button class="btn btn-operator" onclick="inputOp('/')">÷</button>
        </div>
        <div class="grid-row">
            <button class="btn" onclick="inputNum('7')">7</button>
            <button class="btn" onclick="inputNum('8')">8</button>
            <button class="btn" onclick="inputNum('9')">9</button>
            <button class="btn btn-operator" onclick="inputOp('*')">×</button>
        </div>
        <div class="grid-row">
            <button class="btn" onclick="inputNum('4')">4</button>
            <button class="btn" onclick="inputNum('5')">5</button>
            <button class="btn" onclick="inputNum('6')">6</button>
            <button class="btn btn-operator" onclick="inputOp('-')">-</button>
        </div>
        <div class="grid-row">
            <button class="btn" onclick="inputNum('1')">1</button>
            <button class="btn" onclick="inputNum('2')">2</button>
            <button class="btn" onclick="inputNum('3')">3</button>
            <button class="btn btn-operator" onclick="inputOp('+')">+</button>
        </div>
        <div class="grid-row">
            <button class="btn btn-ai" id="aiBtn" onclick="toggleAiMode()">AI</button>
            <button class="btn" onclick="inputNum('0')">0</button>
            <button class="btn" onclick="inputNum('.')">.</button>
            <button class="btn btn-equal" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let currentInput = "0";
        let isAiMode = false;
        let history = JSON.parse(localStorage.getItem('calc_history')) || [];

        const calcDisplay = document.getElementById('calcDisplay');
        const queryDisplay = document.getElementById('queryDisplay');
        const aiBtn = document.getElementById('aiBtn');
        const historyDrawer = document.getElementById('historyDrawer');

        function updateDisplay() {
            calcDisplay.innerText = currentInput;
        }

        function inputNum(num) {
            if (currentInput === "0" && num !== ".") {
                currentInput = num;
            } else {
                currentInput += num;
            }
            updateDisplay();
        }

        function inputOp(op) {
            if (isAiMode) return;
            let lastChar = currentInput.slice(-1);
            if (['+','-','*','/','%'].includes(lastChar)) {
                currentInput = currentInput.slice(0, -1) + op;
            } else {
                currentInput += op;
            }
            updateDisplay();
        }

        function clearAll() {
            currentInput = "0";
            queryDisplay.innerText = "";
            calcDisplay.style.fontSize = "44px";
            updateDisplay();
        }

        function backspace() {
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = "0";
            }
            updateDisplay();
        }

        function toggleAiMode() {
            isAiMode = !isAiMode;
            if (isAiMode) {
                aiBtn.classList.add('active');
                queryDisplay.innerText = "AI Mode: Enter text expression or question";
                currentInput = "";
                let textQuery = prompt("Ask Patalix AI (e.g., sin(45) or bihar ki rajdhani):");
                if (textQuery) {
                    currentInput = textQuery;
                } else {
                    isAiMode = false;
                    aiBtn.classList.remove('active');
                    currentInput = "0";
                }
            } else {
                aiBtn.classList.remove('active');
                currentInput = "0";
                queryDisplay.innerText = "";
            }
            updateDisplay();
        }

        // Processing Router Logic
        function calculate() {
            let processedInput = currentInput.trim().toLowerCase();

            // 1. OFFLINE INTELLIGENT MATHEMATICS ENGINE (No APIs, Zero Internet Required)
            // Algebraic Formulas Map Rules
            if (processedInput.includes("(a+b)^2") || processedInput.includes("(a+b)^2") || processedInput.includes("a+b ka hole square")) {
                showOfflineMath("(a + b)²", "a² + 2ab + b²"); return;
            }
            if (processedInput.includes("(a-b)^2") || processedInput.includes("a-b ka hole square")) {
                showOfflineMath("(a - b)²", "a² - 2ab + b²"); return;
            }
            // Pythagorean Theorem Map Rules
            if (processedInput.includes("pythagoras") || processedInput.includes("lamb square") || processedInput.includes("karn square")) {
                showOfflineMath("Pythagoras Theorem", "Karn² = Lamb² + Aadhar² (h² = p² + b²)"); return;
            }
            // Geometry Area Systems
            if (processedInput.includes("circle area") || processedInput.includes(" वृत्त का क्षेत्रफल")) {
                showOfflineMath("Area of Circle", "πr² (where π ≈ 3.14159)"); return;
            }
            // Trigonometric Token Parsers
            if (processedInput.startsWith("sin") || processedInput.startsWith("cos") || processedInput.startsWith("tan")) {
                parseOfflineTrig(processedInput); return;
            }

            // 2. ONLINE GENERAL KNOWLEDGE DISPATCHER (Uses Free Direct Endpoint)
            if (isAiMode) {
                fetchOnlineGk(currentInput);
                return;
            }

            // Standard Basic Native Evaluator Execution Flow
            try {
                let sanitizedExpression = currentInput.replace(/×/g, '*').replace(/÷/g, '/');
                let result = eval(sanitizedExpression);
                queryDisplay.innerText = currentInput + " =";
                saveHistory(currentInput, result);
                currentInput = String(result);
            } catch (e) {
                calcDisplay.innerText = "Error";
                currentInput = "0";
            }
            updateDisplay();
        }

        // Render Local Math Module Data
        function showOfflineMath(formulaName, structuralExpansion) {
            queryDisplay.innerText = formulaName;
            calcDisplay.style.fontSize = "22px";
            calcDisplay.innerText = structuralExpansion;
            saveHistory(formulaName, structuralExpansion);
            isAiMode = false;
            aiBtn.classList.remove('active');
        }

        // Trigonometric Core Operations Handler
        function parseOfflineTrig(input) {
            try {
                let match = input.match(/(sin|cos|tan)\(([^)]+)\)/) || input.match(/(sin|cos|tan)\s*([0-9.]+)/);
                if (match) {
                    let func = match[1];
                    let val = parseFloat(match[2]);
                    let rad = val * (Math.PI / 180); // Conversion of angles to structural Radians units
                    let res = 0;
                    
                    if (func === "sin") res = Math.sin(rad);
                    if (func === "cos") res = Math.cos(rad);
                    if (func === "tan") res = Math.tan(rad);
                    
                    let finalVal = Number(res.toFixed(5));
                    queryDisplay.innerText = `${func}(${val}°)`;
                    calcDisplay.style.fontSize = "44px";
                    calcDisplay.innerText = finalVal;
                    saveHistory(`${func}(${val}°)`, finalVal);
                } else {
                    calcDisplay.innerText = "Format: sin(45)";
                }
            } catch(e) {
                calcDisplay.innerText = "Trig Error";
            }
            isAiMode = false;
            aiBtn.classList.remove('active');
        }

        // Online GK API-less DuckDuckGo Extraction Module
        function fetchOnlineGk(question) {
            if (!question.trim()) return;
            calcDisplay.innerText = "Searching Patalix DB...";
            
            let url = `https://api.duckduckgo.com/?q=${encodeURIComponent(question)}&format=json&no_html=1`;

            fetch(url)
                .then(res => res.json())
                .then(data => {
                    let answer = "";
                    if (data.AbstractText) {
                        answer = data.AbstractText;
                    } else if (data.RelatedTopics && data.RelatedTopics.length > 0) {
                        answer = data.RelatedTopics[0].Text;
                    } else {
                        answer = "Patalix Search: Information not available in the public domain directory right now.";
                    }
                    queryDisplay.innerText = "Q: " + question;
                    calcDisplay.style.fontSize = "20px";
                    calcDisplay.innerText = answer;
                    saveHistory("Q: " + question, answer);
                    isAiMode = false;
                    aiBtn.classList.remove('active');
                })
                .catch(err => {
                    queryDisplay.innerText = "Network extraction failed";
                    calcDisplay.innerText = "Offline Mode";
                    isAiMode = false;
                    aiBtn.classList.remove('active');
                });
        }

        // Local Storage History Operations Database
        function saveHistory(q, a) {
            history.unshift({q: q, a: a});
            if(history.length > 20) history.pop();
            localStorage.setItem('calc_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const container = document.getElementById('historyItems');
            container.innerHTML = history.map(item => `
                <div class="history-item">
                    <div class="history-q">${item.q}</div>
                    <div class="history-a">${item.a}</div>
                </div>
            `).join('');
        }

        // System UI Gestures Configuration (Swipe down from upper region to read history)
        let touchstartY = 0;
        let touchendY = 0;
        const swipeZone = document.getElementById('swipeZone');

        swipeZone.addEventListener('touchstart', e => {
            touchstartY = e.changedTouches[0].screenY;
        }, { passive: true });

        swipeZone.addEventListener('touchend', e => {
            touchendY = e.changedTouches[0].screenY;
            handleGesture();
        }, { passive: true });

        function handleGesture() {
            if (touchendY - touchstartY > 75) {
                historyDrawer.classList.add('open');
            }
        }

        document.getElementById('viewHistoryBtn').addEventListener('click', () => historyDrawer.classList.add('open'));
        document.getElementById('closeDrawer').addEventListener('click', () => {
            historyDrawer.classList.remove('open');
            calcDisplay.style.fontSize = "44px";
        });
        document.getElementById('clearHistory').addEventListener('click', () => {
            history = [];
            localStorage.removeItem('calc_history');
            renderHistory();
        });

        renderHistory();
    </script>
</body>
</html>

name: Build Android APK (Patalix)

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 16

    - name: Install Cordova and Setup Project
      run: |
        npm install -g cordova
        cordova create myApp com.patalix.calc "Patalix Calc"
        rm -rf myApp/www/*
        cp calculator.html myApp/www/index.html

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        distribution: 'zulu'
        java-version: '11'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Add Android Platform and Build APK
      run: |
        cd myApp
        cordova platform add android
        cordova build android --release

    - name: Upload APK to GitHub Artifacts
      uses: actions/upload-artifact@v3
      with:
        name: Patalix-Calculator-APK
        path: myApp/platforms/android/app/build/outputs/apk/release/app-release-unsigned.apk


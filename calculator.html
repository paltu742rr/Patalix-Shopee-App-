<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patalix Smart Google-Style Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #202124;
            font-family: 'Roboto', Arial, sans-serif;
            margin: 0;
        }

        .calculator-container {
            width: 350px;
            background: #303134;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            padding: 20px;
            border: 1px solid #3c4043;
            position: relative;
            overflow: hidden;
        }

        /* Top Header */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .icon-btn {
            background: none;
            border: none;
            color: #9aa0a6;
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
            transition: color 0.2s;
        }

        .icon-btn:hover {
            color: #8ab4f8;
        }

        /* Screen Setup */
        .screen {
            width: 100%;
            height: 100px;
            background: transparent;
            text-align: right;
            margin-bottom: 15px;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 5px;
        }

        #history {
            font-size: 16px;
            color: #9aa0a6;
            min-height: 22px;
            margin-bottom: 5px;
        }

        #result {
            font-size: 36px;
            color: #e8eaed;
            font-weight: 400;
            white-space: nowrap;
            overflow-x: auto;
        }

        #result::-webkit-scrollbar { display: none; }

        /* Sliding History Panel */
        .history-panel {
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 75%;
            background: #303134;
            border-bottom: 2px solid #3c4043;
            transition: top 0.3s ease-in-out;
            padding: 20px;
            box-sizing: border-box;
            z-index: 10;
            display: flex;
            flex-direction: column;
        }

        .history-panel.open {
            top: 0;
        }

        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: #e8eaed;
            margin-bottom: 15px;
            border-bottom: 1px solid #3c4043;
            padding-bottom: 10px;
        }

        .history-list {
            flex-grow: 1;
            overflow-y: auto;
            color: #9aa0a6;
            font-size: 15px;
            text-align: right;
        }

        .history-item {
            margin-bottom: 12px;
            cursor: pointer;
            padding: 6px;
            border-radius: 4px;
        }

        .history-item:hover {
            background: #3c4043;
            color: #e8eaed;
        }

        /* Buttons Grid */
        .buttons-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        .btn {
            border: none;
            border-radius: 8px;
            font-size: 20px;
            padding: 16px;
            cursor: pointer;
            background-color: #3c4043;
            color: #e8eaed;
            transition: background 0.1s;
        }

        .btn:hover { background-color: #4f5357; }
        .btn.operator { background-color: #5f6368; }
        .btn.operator:hover { background-color: #70757a; }
        .btn.function { color: #8ab4f8; }
        
        .btn.equals {
            background-color: #8ab4f8;
            color: #202124;
            font-weight: bold;
        }
        .btn.equals:hover { background-color: #aecbfa; }

        /* AI Question Box Launcher Button */
        .btn.ai-btn {
            background-color: #f28b82;
            color: #202124;
            font-weight: bold;
        }
        .btn.ai-btn:hover { background-color: #f6aea9; }

        /* Offline Smart Answer Box */
        .ai-box {
            display: none;
            margin-top: 10px;
            width: 100%;
        }
        .ai-box input {
            width: 100%;
            padding: 12px;
            background: #202124;
            border: 1px solid #3c4043;
            border-radius: 6px;
            color: #e8eaed;
            box-sizing: border-box;
            font-size: 14px;
            outline: none;
        }
        .ai-box input:focus {
            border-color: #8ab4f8;
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        <!-- History Panel -->
        <div class="history-panel" id="historyPanel">
            <div class="history-header">
                <span style="font-weight: bold;">History Log</span>
                <button class="icon-btn" onclick="toggleHistory()">✕</button>
            </div>
            <div class="history-list" id="historyList">
                <div style="text-align: center; margin-top: 20px; color: #70757a;">No history yet</div>
            </div>
            <button class="btn function" style="font-size: 13px; padding: 6px; margin-top: 10px; background: #3c4043;" onclick="clearAllHistory()">Clear All History</button>
        </div>

        <!-- Top Controls -->
        <div class="top-bar">
            <button class="icon-btn" onclick="toggleHistory()" title="View History">🕒</button>
            <span style="color: #9aa0a6; font-size: 13px; font-weight: bold; letter-spacing: 1px;">PATALIX SMART CALC</span>
        </div>

        <!-- Display Screen -->
        <div class="screen">
            <div id="history"></div>
            <div id="result">0</div>
        </div>

        <!-- Buttons Grid -->
        <div class="buttons-grid">
            <button class="btn function" onclick="clearScreen()">AC</button>
            <button class="btn function" onclick="deleteLast()">CE</button>
            <button class="btn operator" onclick="appendOperator('%')">%</button>
            <button class="btn operator" onclick="appendOperator('/')">÷</button>

            <button class="btn number" onclick="appendNumber('7')">7</button>
            <button class="btn number" onclick="appendNumber('8')">8</button>
            <button class="btn number" onclick="appendNumber('9')">9</button>
            <button class="btn operator" onclick="appendOperator('*')">×</button>

            <button class="btn number" onclick="appendNumber('4')">4</button>
            <button class="btn number" onclick="appendNumber('5')">5</button>
            <button class="btn number" onclick="appendNumber('6')">6</button>
            <button class="btn operator" onclick="appendOperator('-')">-</button>

            <button class="btn number" onclick="appendNumber('1')">1</button>
            <button class="btn number" onclick="appendNumber('2')">2</button>
            <button class="btn number" onclick="appendNumber('3')">3</button>
            <button class="btn operator" onclick="appendOperator('+')">+</button>

            <!-- Offline AI Box Trigger -->
            <button class="btn ai-btn" onclick="toggleAIBox()">AI</button>
            <button class="btn number" onclick="appendNumber('0')">0</button>
            <button class="btn number" onclick="appendNumber('.')">.</button>
            <!-- Normal Square Root Button -->
            <button class="btn operator" onclick="calculateRoot()">√</button>
            
            <!-- Long Equals Button at the bottom -->
            <button class="btn equals" style="grid-column: span 4; margin-top: 5px; padding: 12px;" onclick="calculate()">=</button>
        </div>

        <!-- Offline AI / Google Smart Query Box -->
        <div class="ai-box" id="aiBox">
            <input type="text" id="aiQuery" placeholder="Ask math or GK (e.g., capital of india, speed of light)..." onkeydown="handleAIQuestion(event)">
        </div>
    </div>

    <script>
        let currentInput = "0";
        let historyInput = "";
        let isCalculated = false;
        let savedCalculations = [];

        const resultDisplay = document.getElementById("result");
        const historyDisplay = document.getElementById("history");
        const historyPanel = document.getElementById("historyPanel");
        const historyList = document.getElementById("historyList");
        const aiBox = document.getElementById("aiBox");

        function updateScreen() {
            resultDisplay.innerText = currentInput;
            historyDisplay.innerText = historyInput;
        }

        function appendNumber(number) {
            if (isCalculated) {
                currentInput = "";
                isCalculated = false;
            }
            if (currentInput === "0" && number !== ".") {
                currentInput = number;
            } else {
                currentInput += number;
            }
            updateScreen();
        }

        function appendOperator(op) {
            isCalculated = false;
            let displayOp = op;
            if (op === '*') displayOp = '×';
            if (op === '/') displayOp = '÷';

            if (currentInput !== "") {
                historyInput = currentInput + " " + displayOp;
                currentInput = "0";
                updateScreen();
            }
        }

        function clearScreen() {
            currentInput = "0";
            historyInput = "";
            isCalculated = false;
            updateScreen();
        }

        function deleteLast() {
            if (isCalculated) return;
            if (currentInput.length > 1) {
                currentInput = currentInput.slice(0, -1);
            } else {
                currentInput = "0";
            }
            updateScreen();
        }

        // Standard Square Root Function (√)
        function calculateRoot() {
            try {
                let num = parseFloat(currentInput);
                if (num < 0) {
                    currentInput = "Error (Negative)";
                } else {
                    historyInput = "√(" + num + ")";
                    let res = Math.sqrt(num);
                    currentInput = String(Math.round(res * 100000000) / 100000000);
                    addHistoryItem(historyInput + " = " + currentInput);
                    isCalculated = true;
                }
            } catch (e) {
                currentInput = "Error";
            }
            updateScreen();
        }

        function calculate() {
            if (historyInput !== "" && !isCalculated) {
                let expression = historyInput + " " + currentInput;
                let fullLog = expression + " =";
                
                try {
                    let formattedExpression = expression.replace(/×/g, '*').replace(/÷/g, '/');
                    if (formattedExpression.includes('%')) {
                        formattedExpression = formattedExpression.replace(/%/g, '/100');
                    }

                    let res = eval(formattedExpression);
                    currentInput = String(Math.round(res * 100000000) / 100000000);
                    historyInput = fullLog;
                    isCalculated = true;

                    addHistoryItem(historyInput + " " + currentInput);
                } catch (error) {
                    currentInput = "Error";
                }
                updateScreen();
            }
        }

        // --- History Logic ---
        function toggleHistory() {
            historyPanel.classList.toggle("open");
        }

        function addHistoryItem(itemText) {
            savedCalculations.push(itemText);
            renderHistory();
        }

        function renderHistory() {
            if (savedCalculations.length === 0) {
                historyList.innerHTML = '<div style="text-align: center; margin-top: 20px; color: #70757a;">No history yet</div>';
                return;
            }
            historyList.innerHTML = "";
            for (let i = savedCalculations.length - 1; i >= 0; i--) {
                let div = document.createElement("div");
                div.className = "history-item";
                div.innerText = savedCalculations[i];
                div.onclick = function() {
                    let parts = savedCalculations[i].split("=");
                    if(parts.length > 1) {
                        currentInput = parts[1].trim();
                        historyInput = parts[0].trim();
                        updateScreen();
                        toggleHistory();
                    }
                };
                historyList.appendChild(div);
            }
        }

        function clearAllHistory() {
            savedCalculations = [];
            renderHistory();
        }

        // --- NO API: Offline Smart Knowledge Engine ---
        function toggleAIBox() {
            if (aiBox.style.display === "block") {
                aiBox.style.display = "none";
            } else {
                aiBox.style.display = "block";
                document.getElementById("aiQuery").focus();
            }
        }

        function handleAIQuestion(event) {
            if (event.key === 'Enter') {
                let query = document.getElementById("aiQuery").value.toLowerCase().trim();
                if (query === "") return;

                historyInput = "Q: " + query;
                
                // 1. Local Database (सवालों के स्थानीय जवाब)
                if (query.includes("capital of india")) {
                    currentInput = "New Delhi";
                } else if (query.includes("who are you") || query.includes("identity") || query.includes("naam")) {
                    currentInput = "Patalix Smart Offline Engine";
                } else if (query.includes("capital of bihar")) {
                    currentInput = "Patna";
                } else if (query.includes("speed of light")) {
                    currentInput = "299,792,458 m/s";
                } else if (query.includes("gravity value") || query.includes("value of g")) {
                    currentInput = "9.8 m/s²";
                } else if (query.includes("water formula") || query.includes("chemical formula of water")) {
                    currentInput = "H2O";
                } else if (query.includes("brightest planet")) {
                    currentInput = "Venus";
                } else {
                    // 2. Local Advanced Math Processor (अगर कोई डायरेक्ट मैथ का सवाल लिख दे बिना बटन दबाए)
                    try {
                        // केवल वैलिड गणितीय कैरेक्टर को ही चलने देगा ताकि सिक्योरिटी बनी रहे
                        let cleanMath = query.replace(/[^0-9+\-*/().%]/g, '');
                        if(cleanMath !== "") {
                            currentInput = String(eval(cleanMath));
                        } else {
                            currentInput = "Offline Database: Query Not Found!";
                        }
                    } catch(e) {
                        currentInput = "Calculation Error";
                    }
                }

                addHistoryItem(historyInput + " -> Ans: " + currentInput);
                updateScreen();
                document.getElementById("aiQuery").value = "";
                aiBox.style.display = "none"; 
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Patalix Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        /* DEFAULT LIGHT MODE STYLING (As per your request) */
        body {
            background-color: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Dark Mode Override class */
        body.dark-mode {
            background-color: #000000;
            color: #ffffff;
        }

        /* Top Header Section */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-name {
            font-size: 14px;
            letter-spacing: 1px;
            color: #888888;
            font-weight: 600;
        }

        /* Three Dots Button for Settings Menu */
        .three-dots-btn {
            font-size: 20px;
            cursor: pointer;
            color: #4285f4;
            padding: 0 5px;
            font-weight: bold;
        }

        .history-btn {
            font-size: 15px;
            color: #4285f4;
            cursor: pointer;
            font-weight: bold;
            padding: 5px 10px;
        }

        /* Sub-Header bar for INV Button */
        .sub-header-bar {
            display: flex;
            justify-content: flex-end;
            padding: 0 20px 10px 20px;
        }

        .inv-toggle-btn {
            font-size: 14px;
            color: #8ab4f8;
            cursor: pointer;
            font-weight: bold;
            background-color: #f1f3f4;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #dae0e2;
        }
        body.dark-mode .inv-toggle-btn {
            background-color: #1c1c1e;
            border: 1px solid #2c2c2e;
        }

        /* Fullscreen Fixed Display Panel */
        .display-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 20px;
        }

        .query-line {
            font-size: 18px;
            color: #888888;
            margin-bottom: 8px;
            min-height: 24px;
            text-align: right;
            width: 100%;
        }

        .main-display {
            font-size: 44px;
            font-weight: 400;
            text-align: right;
            width: 100%;
            word-wrap: break-word;
            overflow-y: auto;
            max-height: 100px;
        }

        /* Main Pad Container */
        .pad-container {
            padding: 12px;
            border-top: 1px solid #e8eaed;
            position: relative;
        }
        body.dark-mode .pad-container {
            border-top: 1px solid #111111;
        }

        /* Google Style Advanced Blue Panel Overlay */
        .advanced-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #172b4d;
            padding: 12px;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 50;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
        }

        .advanced-panel.open {
            transform: translateY(0);
        }

        .grid-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .btn {
            flex: 1;
            margin: 5px;
            height: 68px;
            border-radius: 50px;
            border: none;
            outline: none;
            font-size: 24px;
            font-weight: 500;
            background-color: #f1f3f4;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.05s ease, background-color 0.1s ease;
        }
        body.dark-mode .btn {
            background-color: #1c1c1e;
            color: #ffffff;
        }

        /* Tactile Button Press Effect */
        .btn:active {
            transform: scale(0.88);
            background-color: #d2d4d6;
        }
        body.dark-mode .btn:active {
            background-color: #2c2c2e;
        }

        .btn-action {
            background-color: #e8eaed;
            color: #3c4043;
        }
        body.dark-mode .btn-action {
            background-color: #3a3a3c;
            color: #d1d1d6;
        }

        .btn-operator {
            background-color: #e8f0fe;
            color: #1a73e8;
        }
        body.dark-mode .btn-operator {
            background-color: #2f3b52;
            color: #8ab4f8;
        }

        .btn-equal {
            background-color: #1a73e8;
            color: #ffffff;
        }
        body.dark-mode .btn-equal {
            background-color: #8ab4f8;
            color: #000000;
        }

        .btn-adv {
            background-color: #233d6b;
            color: #aecbfa;
            font-size: 18px;
            font-weight: bold;
            height: 60px;
        }

        /* History Panel */
        .history-drawer {
            position: fixed;
            top: -100%;
            left: 0;
            width: 100%;
            height: 85%;
            background-color: #f8f9fa;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: top 0.35s cubic-bezier(0.15, 0.85, 0.35, 1);
            z-index: 999;
            display: flex;
            flex-direction: column;
            padding: 22px;
        }
        body.dark-mode .history-drawer {
            background-color: #121212;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9);
        }

        .history-drawer.open {
            top: 0;
        }

        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid #dae0e2;
            margin-bottom: 15px;
        }
        body.dark-mode .drawer-header {
            border-bottom: 1px solid #222222;
        }

        .drawer-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .history-item {
            padding: 12px 15px;
            border-bottom: 1px solid #f1f3f4;
            text-align: right;
            position: relative;
            transition: transform 0.2s ease-out, opacity 0.2s ease-out;
        }
        body.dark-mode .history-item {
            border-bottom: 1px solid #1c1c1e;
        }

        .history-q { color: #8a8a8f; font-size: 16px; }
        .history-a { font-size: 22px; margin-top: 5px; }

        /* --- PRE-BUILT SETTINGS MODAL DIALOG --- */
        .settings-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .settings-modal.open {
            opacity: 1;
            pointer-events: auto;
        }

        .settings-box {
            background-color: #ffffff;
            color: #000000;
            width: 85%;
            max-width: 340px;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transform: scale(0.9);
            transition: transform 0.3s ease;
        }
        body.dark-mode .settings-box {
            background-color: #1e1e1e;
            color: #ffffff;
        }

        .settings-modal.open .settings-box {
            transform: scale(1);
        }

        .settings-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        body.dark-mode .settings-title {
            border-bottom: 1px solid #333;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .setting-label {
            font-size: 15px;
            font-weight: 500;
        }

        .setting-control select, .setting-control input {
            padding: 6px 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background-color: #fff;
            color: #000;
            outline: none;
        }
        body.dark-mode .setting-control select, body.dark-mode .setting-control input {
            border: 1px solid #444;
            background-color: #2c2c2e;
            color: #fff;
        }

        .setting-control input[type="number"] {
            width: 80px;
            text-align: center;
        }

        .close-settings-btn {
            background-color: #4285f4;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            float: right;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div id="settingsModal" class="settings-modal">
        <div class="settings-box">
            <div class="settings-title">⚙️ Patalix Settings</div>
            
            <div class="setting-row">
                <div class="setting-label">Theme Mode</div>
                <div class="setting-control">
                    <select id="themeSelect" onchange="changeTheme()">
                        <option value="light">Light Mode</option>
                        <option value="dark">Dark Mode</option>
                        <option value="system">System Default</option>
                    </select>
                </div>
            </div>

            <div class="setting-row">
                <div class="setting-label">Haptic Vibration</div>
                <div class="setting-control">
                    <select id="vibrateSelect" onchange="toggleVibration()">
                        <option value="off">OFF</option>
                        <option value="on">ON</option>
                    </select>
                </div>
            </div>

            <div class="setting-row">
                <div class="setting-label">History Limit</div>
                <div class="setting-control">
                    <input type="number" id="historyLimitInput" min="1" placeholder="Max" oninput="changeHistoryLimit()">
                </div>
            </div>
            <div style="font-size: 11px; color: #888; margin-top: -10px; margin-bottom: 15px;">Leave empty for Unlimited rows.</div>

            <button class="close-settings-btn" onclick="closeSettings()">OK</button>
        </div>
    </div>

    <div id="historyDrawer" class="history-drawer">
        <div class="drawer-header">
            <span style="font-weight: bold; color: #8e8e93; font-size: 16px;">History</span>
            <span id="clearHistory" style="color: #4285f4; font-size: 15px; font-weight: bold; cursor: pointer;">Clear all</span>
            <span style="font-size: 26px; color: #ff6b6b; cursor: pointer;" id="closeDrawer">✕</span>
        </div>
        <div class="drawer-content" id="historyItems"></div>
    </div>

    <div class="header-bar">
        <div class="header-left">
            <div class="brand-name">PATALIX CALCULATOR</div>
            <div class="three-dots-btn" onclick="openSettings()">⁝</div>
        </div>
        <div class="history-btn" id="viewHistoryBtn">History</div>
    </div>

    <div class="sub-header-bar">
        <div class="inv-toggle-btn" id="advToggleBtn" onclick="toggleAdvancedPanel()">INV ⌃</div>
    </div>

    <div class="display-container" id="swipeZone">
        <div class="query-line" id="queryDisplay"></div>
        <div class="main-display" id="calcDisplay">0</div>
    </div>

    <div class="pad-container">
        
        <div class="advanced-panel" id="advancedPanel">
            <div class="grid-row" style="justify-content: center; margin-bottom: 5px;">
                <div style="width: 40px; height: 5px; background-color: #4b6584; border-radius: 10px; cursor: pointer;" onclick="toggleAdvancedPanel()"></div>
            </div>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Patalix Google Style Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Pure Clean White Background Style */
        body {
            background-color: #ffffff;
            color: #000000;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Header Section */
        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background-color: #ffffff;
        }

        .brand-name {
            font-size: 14px;
            letter-spacing: 1px;
            color: #888888;
            font-weight: 600;
        }

        .history-btn {
            font-size: 15px;
            color: #1a73e8;
            cursor: pointer;
            font-weight: bold;
            padding: 5px 10px;
        }

        /* Sub-Header bar for INV Button */
        .sub-header-bar {
            display: flex;
            justify-content: flex-end;
            padding: 0 20px 10px 20px;
            background-color: #ffffff;
        }

        .inv-toggle-btn {
            font-size: 14px;
            color: #1a73e8;
            cursor: pointer;
            font-weight: bold;
            background-color: #f1f3f4;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #dae0e2;
        }

        /* Display Panel Screen */
        .display-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 20px;
            background-color: #ffffff;
        }

        .query-line {
            font-size: 18px;
            color: #888888;
            margin-bottom: 8px;
            min-height: 24px;
            text-align: right;
            width: 100%;
        }

        .main-display {
            font-size: 44px;
            font-weight: 400;
            text-align: right;
            width: 100%;
            word-wrap: break-word;
            color: #000000;
        }

        /* Main Pad Buttons Container */
        .pad-container {
            padding: 12px;
            border-top: 1px solid #e8eaed;
            position: relative;
            background-color: #ffffff;
        }

        /* Google Style Advanced Blue Panel Overlay */
        .advanced-panel {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #172b4d;
            padding: 12px;
            display: flex;
            flex-direction: column;
            transform: translateY(100%);
            transition: transform 0.2s cubic-bezier(0, 0, 0.2, 1);
            z-index: 50;
            border-top-left-radius: 16px;
            border-top-right-radius: 16px;
        }

        .advanced-panel.open {
            transform: translateY(0);
        }

        .grid-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .btn {
            flex: 1;
            margin: 5px;
            height: 68px;
            border-radius: 50px;
            border: none;
            outline: none;
            font-size: 24px;
            font-weight: 500;
            background-color: #f1f3f4;
            color: #000000;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.05s ease;
        }

        /* Fast Tactile Button Press Effect */
        .btn:active {
            transform: scale(0.9);
            background-color: #e8eaed;
        }

        .btn-action {
            background-color: #e8eaed;
            color: #3c4043;
        }

        .btn-operator {
            background-color: #e8f0fe;
            color: #1a73e8;
        }

        .btn-equal {
            background-color: #1a73e8;
            color: #ffffff;
        }

        .btn-adv {
            background-color: #233d6b;
            color: #aecbfa;
            font-size: 18px;
            font-weight: bold;
            height: 60px;
        }
        .btn-adv:active {
            background-color: #2d4d85;
        }

        /* Sliding History Drawer Sheet */
        .history-drawer {
            position: fixed;
            top: -100%;
            left: 0;
            width: 100%;
            height: 85%;
            background-color: #f8f9fa;
            border-bottom-left-radius: 24px;
            border-bottom-right-radius: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            transition: top 0.25s cubic-bezier(0, 0, 0.2, 1);
            z-index: 999;
            display: flex;
            flex-direction: column;
            padding: 22px;
        }

        .history-drawer.open {
            top: 0;
        }

        .drawer-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 15px;
            border-bottom: 1px solid #dae0e2;
            margin-bottom: 15px;
        }

        .drawer-content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .history-item {
            padding: 12px 15px;
            border-bottom: 1px solid #f1f3f4;
            text-align: right;
            background-color: #f8f9fa;
            transition: transform 0.15s ease-out, opacity 0.15s ease-out;
        }

        .history-q { color: #8a8a8f; font-size: 16px; }
        .history-a { font-size: 22px; margin-top: 5px; color: #000000; }
    </style>
</head>
<body>

    <div id="historyDrawer" class="history-drawer">
        <div class="drawer-header">
            <span style="font-weight: bold; color: #8e8e93; font-size: 16px;">History</span>
            <span id="clearHistory" style="color: #1a73e8; font-size: 15px; font-weight: bold; cursor: pointer;">Clear all</span>
            <span style="font-size: 26px; color: #ff6b6b; cursor: pointer;" id="closeDrawer">✕</span>
        </div>
        <div class="drawer-content" id="historyItems"></div>
    </div>

    <div class="header-bar">
        <div class="brand-name">PATALIX CALCULATOR</div>
        <div class="history-btn" id="viewHistoryBtn">History</div>
    </div>

    <div class="sub-header-bar">
        <div class="inv-toggle-btn" id="advToggleBtn" onclick="toggleAdvancedPanel()">INV ⌃</div>
    </div>

    <div class="display-container" id="swipeZone">
        <div class="query-line" id="queryDisplay"></div>
        <div class="main-display" id="calcDisplay">0</div>
    </div>

    <div class="pad-container">
        
        <div class="advanced-panel" id="advancedPanel">
            <div class="grid-row" style="justify-content: center; margin-bottom: 5px;">
                <div style="width: 40px; height: 5px; background-color: #4b6584; border-radius: 10px; cursor: pointer;" onclick="toggleAdvancedPanel()"></div>
            </div>
            <div class="grid-row">
                <button class="btn btn-adv" onclick="btnPress('sin(')">sin</button>
                <button class="btn btn-adv" onclick="btnPress('cos(')">cos</button>
                <button class="btn btn-adv" onclick="btnPress('tan(')">tan</button>
                <button class="btn btn-adv" onclick="btnPress('log(')">log</button>
            </div>
            <div class="grid-row">
                <button class="btn btn-adv" onclick="btnPress('ln(')">ln</button>
                <button class="btn btn-adv" onclick="btnPress('3.14159')">π</button>
                <button class="btn btn-adv" onclick="btnPress('2.71828')">e</button>
                <button class="btn btn-adv" onclick="btnPress('^')">^</button>
            </div>
            <div class="grid-row">
                <button class="btn btn-adv" onclick="btnPress('sqrt(')">√</button>
                <button class="btn btn-adv" onclick="btnPress('(')">(</button>
                <button class="btn btn-adv" onclick="btnPress(')')">)</button>
                <button class="btn btn-adv" style="background-color: #ff6b6b; color: #000000;" onclick="toggleAdvancedPanel()">Close ⌄</button>
            </div>
        </div>

        <div class="grid-row">
            <button class="btn btn-action" onclick="btnPress('AC')">AC</button>
            <button class="btn btn-action" onclick="btnPress('CE')">⌫</button>
            <button class="btn btn-action" onclick="btnPress('%')">%</button>
            <button class="btn btn-operator" onclick="btnPress('/')">÷</button>
        </div>
        <div class="grid-row">
            <button class="btn" onclick="btnPress('7')">7</button>
            <button class="btn" onclick="btnPress('8')">8</button>
            <button class="btn" onclick="btnPress('9')">9</button>
            <button class="btn btn-operator" onclick="btnPress('*')">×</button>
        </div>
        <div class="grid-row">
            <button class="btn" onclick="btnPress('4')">4</button>
            <button class="btn" onclick="btnPress('5')">5</button>
            <button class="btn" onclick="btnPress('6')">6</button>
            <button class="btn btn-operator" onclick="btnPress('-')">−</button>
        </div>
        <div class="grid-row">
            <button class="btn" onclick="btnPress('1')">1</button>
            <button class="btn" onclick="btnPress('2')">2</button>
            <button class="btn" onclick="btnPress('3')">3</button>
            <button class="btn btn-operator" onclick="btnPress('+')">+</button>
        </div>
        <div class="grid-row">
            <button class="btn btn-action" onclick="btnPress('00')">00</button>
            <button class="btn" onclick="btnPress('0')">0</button>
            <button class="btn" onclick="btnPress('.')">.</button>
            <button class="btn btn-equal" onclick="btnPress('=')">=</button>
        </div>
    </div>

    <script>
        let currentInput = "";
        let isEvaluated = false;
        let history = JSON.parse(localStorage.getItem('calc_history')) || [];

        const calcDisplay = document.getElementById('calcDisplay');
        const queryDisplay = document.getElementById('queryDisplay');
        const advancedPanel = document.getElementById('advancedPanel');
        const historyDrawer = document.getElementById('historyDrawer');
        const advToggleBtn = document.getElementById('advToggleBtn');
        const historyItemsContainer = document.getElementById('historyItems');

        function btnPress(action) {
            if (action === 'AC') {
                currentInput = ""; queryDisplay.innerText = ""; calcDisplay.innerText = "0"; isEvaluated = false; return;
            }
            if (action === 'CE') {
                if (isEvaluated) { queryDisplay.innerText = ""; return; }
                currentInput = currentInput.slice(0, -1); calcDisplay.innerText = currentInput || "0"; return;
            }
            if (action === '=') {
                calculate(); return;
            }

            if (isEvaluated) {
                if (!isNaN(action) || action === '.') currentInput = "";
                isEvaluated = false;
            }

            // Screen operators blocker duplication logic
            const operators = ['+', '-', '*', '/', '%', '^', '.'];
            if (operators.includes(action) && operators.includes(currentInput.slice(-1))) return;

            if (currentInput === "0" && action === "0") return;

            currentInput = (currentInput === "0" && !operators.includes(action) && action !== '.') ? action : currentInput + action;
            calcDisplay.innerText = currentInput;
        }

        function toggleAdvancedPanel() {
            advancedPanel.classList.toggle('open');
            advToggleBtn.innerText = advancedPanel.classList.contains('open') ? "INV ⬇" : "INV ⌃";
        }

        // Optimized execution mathematical core formulas parsing
        function calculate() {
            if (!currentInput) return;
            
            const hasOperator = /[+\-*/%^]/.test(currentInput) || currentInput.includes('sin') || currentInput.includes('cos') || currentInput.includes('tan') || currentInput.includes('log') || currentInput.includes('ln') || currentInput.includes('sqrt');
            
            // FIXED BUG: If user just inputs single number (like 05), display same number like Google Calc
            if (!hasOperator) {
                queryDisplay.innerText = currentInput + " =";
                let cleanedNum = Number(currentInput).toString();
                if(currentInput.includes('.')) cleanedNum = currentInput;
                calcDisplay.innerText = cleanedNum;
                currentInput = cleanedNum;
                isEvaluated = true;
                return;
            }

            try {
                queryDisplay.innerText = currentInput + " =";
                let parseExpr = currentInput.replace(/×/g, '*').replace(/÷/g, '/');
                
                parseExpr = parseExpr.replace(/sin\(([^)]+)\)/g, (m, val) => Math.sin(parseFloat(val) * Math.PI / 180));
                parseExpr = parseExpr.replace(/cos\(([^)]+)\)/g, (m, val) => Math.cos(parseFloat(val) * Math.PI / 180));
                parseExpr = parseExpr.replace(/tan\(([^)]+)\)/g, (m, val) => Math.tan(parseFloat(val) * Math.PI / 180));
                parseExpr = parseExpr.replace(/log\(([^)]+)\)/g, (m, val) => Math.log10(parseFloat(val)));
                parseExpr = parseExpr.replace(/ln\(([^)]+)\)/g, (m, val) => Math.log(parseFloat(val)));
                parseExpr = parseExpr.replace(/sqrt\(([^)]+)\)/g, (m, val) => Math.sqrt(parseFloat(val)));
                
                while(parseExpr.includes('^')) {
                    parseExpr = parseExpr.replace(/([0-9.]+)\^([0-9.]+)/g, (m, base, exp) => Math.pow(parseFloat(base), parseFloat(exp)));
                }

                let result = eval(parseExpr);
                if (String(result).includes('.') && String(result).split('.')[1].length > 6) {
                    result = Number(result.toFixed(6));
                }

                calcDisplay.innerText = result;
                saveHistory(currentInput, result);
                currentInput = String(result);
                isEvaluated = true;
            } catch (e) {
                calcDisplay.innerText = "Error";
                currentInput = "";
                isEvaluated = true;
            }
        }

        function saveHistory(q, a) {
            history.unshift({q: q, a: a});
            if (history.length > 25) history.pop();
            localStorage.setItem('calc_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            if (history.length === 0) {
                historyItemsContainer.innerHTML = '<div style="text-align:center; color:#888; margin-top:30px;">No History</div>';
                return;
            }
            
            historyItemsContainer.innerHTML = history.map((item, index) => `
                <div class="history-item" id="item-${index}">
                    <div class="history-q">${item.q}</div>
                    <div class="history-a">${item.a}</div>
                </div>
            `).join('');

            // Fast Left-to-Right touch swipe to Delete Single Rows
            history.forEach((item, index) => {
                let element = document.getElementById(`item-${index}`);
                let startX = 0;

                element.addEventListener('touchstart', e => {
                    startX = e.changedTouches[0].screenX;
                }, { passive: true });

                element.addEventListener('touchmove', e => {
                    let moveX = e.changedTouches[0].screenX;
                    let diffX = moveX - startX;
                    if (diffX > 0) {
                        element.style.transform = `translateX(${diffX}px)`;
                        element.style.opacity = `${1 - (diffX / 250)}`;
                    }
                }, { passive: true });

                element.addEventListener('touchend', e => {
                    let endX = e.changedTouches[0].screenX;
                    if (endX - startX > 110) {
                        element.style.transform = 'translateX(100%)';
                        element.style.opacity = '0';
                        setTimeout(() => {
                            history.splice(index, 1);
                            localStorage.setItem('calc_history', JSON.stringify(history));
                            renderHistory();
                        }, 150);
                    } else {
                        element.style.transform = 'translateX(0)';
                        element.style.opacity = '1';
                    }
                }, { passive: true });
            });
        }

        // --- GOOGLE CALC CORE SWIPE GESTURES ---
        let touchstartY = 0;
        let touchendY = 0;

        // Main Screen Display Area Swipe-down -> Opens History Panel Drawer
        document.getElementById('swipeZone').addEventListener('touchstart', e => {
            touchstartY = e.changedTouches[0].screenY;
        }, { passive: true });

        document.getElementById('swipeZone').addEventListener('touchend', e => {
            touchendY = e.changedTouches[0].screenY;
            if (touchendY - touchstartY > 65) {
                historyDrawer.classList.add('open');
            }
        }, { passive: true });

        // History Drawer Body Swipe-up -> Closes/Dismisses Sheet View instantly
        historyItemsContainer.addEventListener('touchstart', e => {
            touchstartY = e.changedTouches[0].screenY;
        }, { passive: true });

        historyItemsContainer.addEventListener('touchend', e => {
            touchendY = e.changedTouches[0].screenY;
            if (touchstartY - touchendY > 65) {
                historyDrawer.classList.remove('open');
            }
        }, { passive: true });

        document.getElementById('viewHistoryBtn').addEventListener('click', () => historyDrawer.classList.add('open'));
        document.getElementById('closeDrawer').addEventListener('click', () => historyDrawer.classList.remove('open'));
        
        document.getElementById('clearHistory').addEventListener('click', () => {
            history = [];
            localStorage.removeItem('calc_history');
            renderHistory();
        });

        renderHistory();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patalix Shopee App</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #ffffff; /* सफेद बैकग्राउंड */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .app-container {
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #e0e0e0;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header {
            color: #003399; /* गहरा नीला */
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .zara-box {
            margin: 20px 0;
        }
        .zara-img {
            width: 100px;
            border-radius: 50%;
            border: 3px solid #00c3ff; /* एक्वा नीला */
        }
        .input-group {
            margin-bottom: 20px;
        }
        input[type="password"] {
            width: 80%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 18px;
            text-align: center;
        }
        .btn-blue {
            background-color: #003399; /* भरोसेमंद गहरा नीला */
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            width: 85%;
        }
        .footer-text {
            font-size: 12px;
            color: gray;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">Patalix Shopee</div>
    
    <div class="zara-box">
        <img src="https://via.placeholder.com/100" alt="Zara AI" class="zara-img">
        <p><strong>ज़ारा:</strong> नमस्ते गौरव! अपना PIN डालें।</p>
    </div>

    <div class="input-group">
        <input type="password" placeholder="••••" maxlength="4">
    </div>

    <button class="btn-blue">Unlock App</button>

    <div class="footer-text">
        Sourced from Flipkart API | Secured by Patalix
    </div>
</div>

</body>
</html>

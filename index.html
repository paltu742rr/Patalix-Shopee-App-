<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patalix Shopee - Secure Access</title>
    <style>
        :root {
            --cobalt-blue: #0047AB;
            --premium-white: #F8F9FA;
        }
        body {
            background-color: var(--premium-white);
            font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            text-align: center;
            width: 100%;
            max-width: 380px;
            border: 1px solid #eee;
        }
        .zara-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #00c3ff, #0047AB);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 20px rgba(0,71,171,0.2);
        }
        .zara-avatar img { width: 50px; filter: brightness(0) invert(1); }
        h1 { color: var(--cobalt-blue); font-size: 28px; margin-bottom: 5px; font-weight: 800; }
        p { color: #666; margin-bottom: 30px; font-size: 14px; }
        .input-box {
            background: #f0f2f5;
            border: 2px solid transparent;
            border-radius: 15px;
            padding: 15px;
            width: 80%;
            font-size: 24px;
            letter-spacing: 10px;
            text-align: center;
            transition: 0.3s;
            outline: none;
        }
        .input-box:focus { border-color: var(--cobalt-blue); background: white; }
        .unlock-btn {
            background: var(--cobalt-blue);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 15px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 25px;
            transition: transform 0.2s;
        }
        .unlock-btn:active { transform: scale(0.98); }
        .footer { font-size: 10px; color: #aaa; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="zara-avatar">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="white"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-5-9h10v2H7z"/></svg>
    </div>
    <h1>Patalix Shopee</h1>
    <p id="zara-text">प्रोटोकॉल सक्रिय। कृपया अपनी पहचान सत्यापित करें।</p>

    <input type="password" class="input-box" id="userPin" maxlength="4" placeholder="••••">

    <button class="unlock-btn" id="loginBtn">ACCESS SYSTEM</button>

    <div class="footer">Encrypted by Patalix OS Build</div>
</div>

<script src="script.js"></script>
</body>
</html>

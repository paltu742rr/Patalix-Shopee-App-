<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patalix Shopee - Pro</title>
    <style>
        :root { --cobalt: #0047AB; --bg: #f5f7fa; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); }
        
        /* Top Navigation */
        .top-nav { background: var(--cobalt); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Category Menu */
        .categories { display: flex; overflow-x: auto; background: white; padding: 10px; gap: 15px; border-bottom: 1px solid #ddd; }
        .cat-item { font-size: 12px; text-align: center; color: #555; }

        /* Product Card */
        .product-card { background: white; margin: 15px; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .product-img { width: 100%; height: auto; display: block; }
        .details { padding: 20px; }
        .brand { color: #888; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .name { font-size: 20px; font-weight: bold; margin: 5px 0; color: #333; }
        .price { color: #2874f0; font-size: 26px; font-weight: bold; }
        
        .buy-btn { background: #fb641b; color: white; border: none; width: 100%; padding: 15px; font-size: 18px; font-weight: bold; border-radius: 10px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="top-nav">
        <b>Patalix Shopee</b>
        <span>🔍</span>
    </div>

    <div class="categories">
        <div class="cat-item">Mobiles</div>
        <div class="cat-item">Fashion</div>
        <div class="cat-item">Electronics</div>
        <div class="cat-item">Home</div>
    </div>

    <div class="product-card">
        <img src="https://static.toiimg.com/thumb/msid-109348232,width-1280,height-720,resizemode-4/109348232.jpg" class="product-img" alt="Motorola Edge 50 Pro">
        <div class="details">
            <span class="brand">Motorola</span>
            <div class="name">Motorola Edge 50 Pro (Luxe Lavender)</div>
            <div class="price">₹29,999</div>
            <div style="color: green; font-weight: bold; margin-top: 5px;">Bank Offer: Extra ₹2000 Off</div>
            <button class="buy-btn">Buy Now</button>
        </div>
    </div>

</body>
</html>
